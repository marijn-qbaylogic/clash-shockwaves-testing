
name: 'haskell-test'

on:
  pull_request:
    paths:
      - 'shockwaves/src/**'
      - 'shockwaves/tests/**'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.10.3'
          cabal-version: '3.14.2.0'
          stack-version: '3.7.1'
      - name: Run tests
        run: |
          cd $GITHUB_WORKSPACE/shockwaves
          stack test
      - name: Upload VCD/JSON files
        uses: actions/upload-artifact@v4
        with:
          name: VCD test output
          path: shockwaves/test
          if-no-files-found: error
